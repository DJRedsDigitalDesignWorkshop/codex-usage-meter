name: CodexUsageMeter
options:
  minimumXcodeGenVersion: 2.44.1
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: io.github.codexusagemeter
    CURRENT_PROJECT_VERSION: 7
    MARKETING_VERSION: 1.0.6
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ALWAYS_SEARCH_USER_PATHS: NO
configs:
  Debug: debug
  Release: release
targets:
  CodexUsageMeter:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    settings:
      base:
        PRODUCT_NAME: Codex Usage Meter
        PRODUCT_MODULE_NAME: CodexUsageMeter
        INFOPLIST_FILE: CodexUsageMeter/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: NO
    sources:
      - path: CodexUsageMeter
    scheme:
      testTargets:
        - CodexUsageMeterTests
  CodexUsageMeterTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    settings:
      base:
        PRODUCT_NAME: CodexUsageMeterTests
        PRODUCT_MODULE_NAME: CodexUsageMeterTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Codex Usage Meter.app/Contents/MacOS/Codex Usage Meter"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: CodexUsageMeterTests
    dependencies:
      - target: CodexUsageMeter
